# =========================================================
# KNEPLATT72 — 24h STATISTICS
# =========================================================

# --- Averages ---
- platform: statistics
  name: KNEPLATT72 Wind Speed (24h Avg)
  unique_id: kneplatt72_wind_speed_24h_avg
  entity_id: sensor.kneplatt72_wind_speed
  state_characteristic: mean
  max_age:
    hours: 24
  precision: 1

- platform: statistics
  name: KNEPLATT72 Temperature (24h Mean)
  unique_id: kneplatt72_temperature_24h_mean
  entity_id: sensor.kneplatt72_temperature
  state_characteristic: mean
  max_age:
    hours: 24
  precision: 1

- platform: statistics
  name: KNEPLATT72 Humidity (24h Mean)
  unique_id: kneplatt72_humidity_24h_mean
  entity_id: sensor.kneplatt72_relative_humidity
  state_characteristic: mean
  max_age:
    hours: 24
  precision: 1

# --- Changes ---
- platform: statistics
  name: KNEPLATT72 Pressure (24h Change)
  unique_id: kneplatt72_pressure_24h_change
  entity_id: sensor.kneplatt72_pressure
  state_characteristic: change
  max_age:
    hours: 24
  precision: 3

- platform: statistics
  name: KNEPLATT72 Temperature (24h Change)
  unique_id: kneplatt72_temperature_24h_change
  entity_id: sensor.kneplatt72_temperature
  state_characteristic: change
  max_age:
    hours: 24
  precision: 1

- platform: statistics
  name: KNEPLATT72 Humidity (24h Change)
  unique_id: kneplatt72_humidity_24h_change
  entity_id: sensor.kneplatt72_relative_humidity
  state_characteristic: change
  max_age:
    hours: 24
  precision: 1

# ===== STATISTICS SENSORS FOR TREND ANALYSIS =====
# These provide the data for the trend calculations above
- platform: statistics
  name: 'Humidor Temp Change (1h)'
  unique_id: humidor_temp_change_1h
  entity_id: sensor.hygrometer_humidor_temperature
  state_characteristic: change
  max_age:
    hours: 1
  precision: 2

- platform: statistics
  name: 'Humidor Temp Stats (24h)'
  unique_id: humidor_temp_stats_24h
  entity_id: sensor.hygrometer_humidor_temperature
  state_characteristic: mean
  max_age:
    hours: 24
  precision: 1

- platform: min_max
  name: 'Humidor Temp Range Today'
  unique_id: humidor_temp_range_today
  type: mean
  entity_ids:
    - sensor.hygrometer_humidor_temperature
